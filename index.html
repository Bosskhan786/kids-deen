<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hadith for Kids – Learn a new authentic Hadith every single day with quizzes, streaks, and badges!" />
  <title>📿 Hadith for Kids</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Google Sign-In (GSI) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Stars background -->
  <div id="stars-bg" aria-hidden="true"></div>

  <!-- App wrapper -->
  <div id="app">

    <!-- ===== AUTH SCREEN ===== -->
    <section id="auth-screen" class="screen active">
      <div class="auth-card card-glass slide-up">
        <div class="auth-hero">
          <div class="auth-mascot">📿</div>
          <h1 class="auth-title">Hadith for Kids</h1>
          <p class="auth-sub">Learn a new Hadith every single day! ✨</p>
        </div>

        <!-- Tab toggle -->
        <div class="tab-toggle">
          <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">🔑 Login</button>
          <button class="tab-btn" data-tab="signup" onclick="switchTab('signup')">✨ Sign Up</button>
        </div>

        <!-- Login form -->
        <div id="tab-login" class="tab-content active">
          <div class="form-group">
            <input type="email" id="login-email" class="input-field" placeholder="Email address 📧" autocomplete="email" />
          </div>
          <div class="form-group">
            <input type="password" id="login-password" class="input-field" placeholder="Password 🔒" autocomplete="current-password" />
          </div>
          <div id="login-error" class="error-msg hidden"></div>
          <button class="btn-primary" onclick="handleLogin()">Let's Learn! 🚀</button>
        </div>

        <!-- Sign up form -->
        <div id="tab-signup" class="tab-content hidden">
          <div class="form-group">
            <input type="text" id="signup-name" class="input-field" placeholder="Your name 😊" autocomplete="name" />
          </div>
          <div class="form-group">
            <input type="email" id="signup-email" class="input-field" placeholder="Email address 📧" autocomplete="email" />
          </div>
          <div class="form-group">
            <input type="password" id="signup-password" class="input-field" placeholder="Password 🔒" autocomplete="new-password" />
          </div>
          <div id="signup-error" class="error-msg hidden"></div>
          <button class="btn-primary" onclick="handleSignup()">Join the Journey! 🌟</button>
        </div>

        <!-- Google Sign-In -->
        <div class="divider"><span>or continue with</span></div>
        <div id="google-btn-container">
          <!-- Google One-Tap / button rendered here by GSI -->
          <div id="g_id_onload"
            data-client_id="394520757016-uearmb25qd6ofsj2ohbb96k57uudibam.apps.googleusercontent.com"
            data-context="signin"
            data-ux_mode="popup"
            data-callback="handleGoogleCredential"
            data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
            data-type="standard"
            data-shape="pill"
            data-theme="outline"
            data-text="continue_with"
            data-size="large"
            data-logo_alignment="left"
            data-width="320">
          </div>
          <!-- Fallback styled button shown when GSI not configured -->
          <button class="btn-google" id="google-fallback-btn" onclick="handleGoogleFallback()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.196 17.64 11.9 17.64 9.2z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.259c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </div>

        <p class="demo-note">💡 Demo: use <strong>test@test.com</strong> / <strong>1234</strong>, or sign up free</p>
      </div>
    </section>

    <!-- ===== MAIN APP ===== -->
    <section id="main-screen" class="screen hidden">

      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <span class="app-logo">📿</span>
          <div>
            <div class="app-name">Hadith Kids</div>
            <div id="header-date" class="header-date"></div>
          </div>
        </div>
        <div class="header-right">
          <div id="streak-pill" class="streak-pill hidden">🔥 <span id="streak-count">0</span></div>
          <div class="avatar" id="header-avatar" title="Profile"></div>
          <button class="btn-logout" onclick="handleLogout()" title="Logout">↩</button>
        </div>
      </header>

      <!-- Streak banner -->
      <div id="streak-banner" class="streak-banner hidden slide-up"></div>

      <!-- Content area -->
      <main id="content-area">

        <!-- ── HADITH VIEW ── -->
        <div id="view-hadith" class="view active">

          <!-- Hadith card -->
          <div id="hadith-card" class="card-glass hadith-card slide-up">
            <div class="hadith-badge-row">
              <span class="today-badge">📅 Today's Hadith</span>
              <span id="hadith-source-label" class="source-label"></span>
            </div>
            <div id="loading-state" class="loading-state">
              <div class="loader"></div>
              <p>Fetching today's Hadith…</p>
            </div>
            <div id="hadith-content" class="hidden">
              <div id="hadith-emoji" class="hadith-emoji"></div>
              <div id="hadith-arabic" class="hadith-arabic"></div>
              <div id="hadith-text" class="hadith-text"></div>
              <div id="hadith-explanation" class="hadith-explanation"></div>
            </div>
            <div id="quiz-result-banner" class="quiz-result hidden"></div>
            <div id="quiz-area" class="hidden"></div>
            <div class="action-row">
              <button class="btn-action" id="btn-listen" onclick="speakHadith()">🔊 Listen</button>
              <button class="btn-action btn-quiz" id="btn-quiz" onclick="showQuiz()">🧠 Quiz</button>
              <button class="btn-action btn-learned" id="btn-learned" onclick="markLearned()">📌 Mark Learned</button>
            </div>
          </div>

          <!-- More hadiths strip -->
          <div class="section-title">📚 Recent Hadiths</div>
          <div id="recent-hadiths" class="recent-list"></div>
        </div>

        <!-- ── DASHBOARD VIEW ── -->
        <div id="view-dashboard" class="view hidden">
          <div class="card-glass slide-up" style="margin-bottom:1.2rem">
            <div class="dash-profile">
              <div class="avatar avatar-lg" id="dash-avatar"></div>
              <div>
                <div id="dash-greeting" class="dash-name"></div>
                <div class="dash-sub">Keep up the amazing work! 🌟</div>
              </div>
            </div>
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-val" id="stat-streak">0 🔥</div>
                <div class="stat-label">Day Streak</div>
              </div>
              <div class="stat-card">
                <div class="stat-val" id="stat-learned">0 📖</div>
                <div class="stat-label">Total Learned</div>
              </div>
              <div class="stat-card">
                <div class="stat-val" id="stat-badges">0 🏅</div>
                <div class="stat-label">Badges</div>
              </div>
            </div>
            <div id="next-badge-area"></div>
          </div>

          <div class="section-title">🏅 Your Badges</div>
          <div id="badges-grid" class="badges-grid"></div>

          <button class="btn-primary" style="margin-top:1rem" onclick="switchView('hadith')">
            📖 Learn Today's Hadith!
          </button>
        </div>

      </main>

      <!-- Bottom nav -->
      <nav class="bottom-nav">
        <button class="nav-btn active" data-view="hadith" onclick="switchView('hadith')">
          <span class="nav-icon">📖</span>
          <span class="nav-label">Today</span>
          <div class="nav-dot"></div>
        </button>
        <button class="nav-btn" data-view="dashboard" onclick="switchView('dashboard')">
          <span class="nav-icon">🏅</span>
          <span class="nav-label">Progress</span>
          <div class="nav-dot"></div>
        </button>
      </nav>
    </section>

  </div><!-- /#app -->

  <!-- App JS modules -->
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="hadith.js"></script>
  <script src="app.js"></script>
  
  <!-- Hide fallback Google button if GSI renders successfully -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (document.querySelector('#google-btn-container iframe')) {
          document.getElementById('google-fallback-btn').style.display = 'none';
        }
      }, 1000);
    });
  </script>

</body>
</html>
